<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Avaliação Bike Shop</title>
</head>
<body class="bg-gray-100 p-6">

    <div class="max-w-2xl mx-auto bg-white rounded-xl shadow-lg overflow-hidden border-t-8 border-green-700">
        <div class="h-40 bg-green-800 flex items-center justify-center text-yellow-400">
            <h1 class="text-3xl font-bold">Bike World Cup Shop</h1>
        </div>

        <form class="p-8 space-y-6">
            <div>
                <label class="block text-gray-700 font-bold mb-2">Conheça nosso App:</label>
                <img src="https://via.placeholder.com/600x200/FACC15/000?text=Screenshot+do+Seu+App" alt="App Preview" class="rounded-lg shadow-md mb-4">
            </div>

            <div>
                <label class="block text-gray-700 font-bold mb-4">Você indicaria nosso app para um amigo?</label>
                <div class="grid grid-cols-1 gap-3">
                    <button type="button" class="bg-green-100 hover:bg-green-200 p-3 rounded border border-green-600 text-left">🤩 Com certeza!</button>
                    <button type="button" class="bg-yellow-50 hover:bg-yellow-100 p-3 rounded border border-yellow-400 text-left">🤔 Indicaria, mas com ressalvas</button>
                    <button type="button" class="bg-blue-100 hover:bg-blue-200 p-3 rounded border border-blue-600 text-left">🛠️ Indicaria depois de melhorias</button>
                    <button type="button" class="bg-red-100 hover:bg-red-200 p-3 rounded border border-red-600 text-left">👎 Não indicaria no momento</button>
                </div>
            </div>

            <button type="submit" class="w-full bg-green-700 text-white font-bold py-3 rounded-lg hover:bg-green-800 transition">Enviar Avaliação</button>
        </form>
    </div>

</body>
</html>
